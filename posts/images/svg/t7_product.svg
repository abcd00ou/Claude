<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bodyGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c28"/>
      <stop offset="100%" style="stop-color:#2a2a3a"/>
    </linearGradient>
    <linearGradient id="faceGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111120"/>
      <stop offset="100%" style="stop-color:#1c1c2e"/>
    </linearGradient>
    <linearGradient id="edgeGrad7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#303045"/>
      <stop offset="100%" style="stop-color:#0c0c1c"/>
    </linearGradient>
    <filter id="shadow7">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="#f5f5f5" rx="10"/>

  <!-- SSD body (isometric) -->
  <polygon points="55,58 235,58 265,43 85,43" fill="url(#faceGrad7)" filter="url(#shadow7)"/>
  <rect x="55" y="58" width="180" height="100" rx="4" fill="url(#bodyGrad7)"/>
  <polygon points="235,58 265,43 265,143 235,158" fill="url(#edgeGrad7)"/>
  <polygon points="55,158 235,158 265,143 85,143" fill="#0a0a18"/>

  <!-- Samsung logo -->
  <text x="115" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1428A0" text-anchor="middle" letter-spacing="2">SAMSUNG</text>

  <!-- Product name -->
  <text x="115" y="117" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">T7</text>

  <!-- Shield badge -->
  <rect x="80" y="125" width="70" height="18" rx="9" fill="#1428A0"/>
  <text x="115" y="138" font-family="Arial, sans-serif" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">SHIELD · 2TB</text>

  <!-- USB-C connector -->
  <rect x="231" y="95" width="36" height="18" rx="3" fill="#252535"/>
  <rect x="233" y="97" width="32" height="14" rx="2" fill="#0c0c1a"/>
  <rect x="237" y="101" width="11" height="6" rx="1" fill="#2a2a40"/>
  <rect x="252" y="101" width="11" height="6" rx="1" fill="#2a2a40"/>

  <!-- IP55 badge -->
  <rect x="155" y="78" width="48" height="16" rx="8" fill="rgba(20,40,160,0.25)" stroke="#1428A0" stroke-width="0.5"/>
  <text x="179" y="89.5" font-family="Arial, sans-serif" font-size="8.5" fill="#7eb8ff" text-anchor="middle" font-weight="bold">IP55</text>

  <!-- Speed label -->
  <text x="160" y="175" font-family="Arial, sans-serif" font-size="10" fill="#1428A0" text-anchor="middle" font-weight="bold">1,050 MB/s READ · USB 3.2 Gen 2 (10Gbps)</text>
</svg>
