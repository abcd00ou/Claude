<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="#f0f4ff" rx="10"/>

  <!-- SSD body (isometric perspective) -->
  <!-- Top face -->
  <polygon points="55,60 235,60 265,45 85,45" fill="url(#faceGrad)" filter="url(#shadow)"/>
  <!-- Main face -->
  <rect x="55" y="60" width="180" height="105" rx="4" fill="url(#bodyGrad)"/>
  <!-- Right side face -->
  <polygon points="235,60 265,45 265,150 235,165" fill="url(#edgeGrad)"/>
  <!-- Bottom right -->
  <polygon points="55,165 235,165 265,150 85,150" fill="#0a0a1a"/>

  <!-- Samsung logo area -->
  <rect x="75" y="80" width="80" height="18" rx="2" fill="rgba(255,255,255,0.05)"/>
  <text x="115" y="93" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1428A0" text-anchor="middle" letter-spacing="2">SAMSUNG</text>

  <!-- Product name -->
  <text x="115" y="118" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">T9</text>

  <!-- Capacity badge -->
  <rect x="85" y="128" width="60" height="18" rx="9" fill="#1428A0"/>
  <text x="115" y="141" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">2 TB</text>

  <!-- USB-C connector (right side) -->
  <rect x="231" y="98" width="38" height="20" rx="3" fill="#2a2a4a"/>
  <rect x="233" y="100" width="34" height="16" rx="2" fill="#0d0d1a"/>
  <rect x="237" y="104" width="12" height="8" rx="1" fill="#333"/>
  <rect x="253" y="104" width="12" height="8" rx="1" fill="#333"/>

  <!-- IP55 badge -->
  <rect x="155" y="80" width="48" height="16" rx="8" fill="rgba(20,40,160,0.3)" stroke="#1428A0" stroke-width="0.5"/>
  <text x="179" y="91.5" font-family="Arial, sans-serif" font-size="8.5" fill="#7eb8ff" text-anchor="middle" font-weight="bold">IP55</text>

  <!-- Speed label -->
  <text x="160" y="175" font-family="Arial, sans-serif" font-size="10" fill="#1428A0" text-anchor="middle" font-weight="bold">2,000 MB/s READ · USB 3.2 Gen 2×2 (20Gbps)</text>
</svg>
