<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a2e"/>
      <stop offset="100%" style="stop-color:#0d2d1a"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <filter id="shadow9">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="200" fill="#f0f4ff" rx="10"/>

  <!-- M.2 PCB (main board) -->
  <rect x="30" y="75" width="260" height="55" rx="4" fill="url(#pcbGrad)" filter="url(#shadow9)"/>

  <!-- Gold edge connector (M-key) -->
  <rect x="30" y="117" width="20" height="13" rx="1" fill="#b8860b"/>
  <!-- Connector notch -->
  <rect x="44" y="117" width="3" height="6" rx="0.5" fill="#1a4a2e"/>
  <!-- Connector pins -->
  <rect x="31" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="33.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="36" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="38.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="41" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="47" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="49.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>

  <!-- Main controller chip -->
  <rect x="68" y="82" width="55" height="40" rx="3" fill="url(#chipGrad)"/>
  <rect x="70" y="84" width="51" height="36" rx="2" fill="#1a1a1a"/>
  <text x="95.5" y="98" font-family="Arial, sans-serif" font-size="7.5" fill="#888" text-anchor="middle">SAMSUNG</text>
  <text x="95.5" y="108" font-family="Arial, sans-serif" font-size="8" fill="#aaa" text-anchor="middle" font-weight="bold">9100 Pro</text>
  <text x="95.5" y="118" font-family="Arial, sans-serif" font-size="6.5" fill="#666" text-anchor="middle">PCIe 5.0</text>

  <!-- NAND chip 1 -->
  <rect x="138" y="82" width="42" height="38" rx="2" fill="url(#chipGrad)"/>
  <rect x="140" y="84" width="38" height="34" rx="1.5" fill="#1c1c1c"/>
  <text x="159" y="105" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">V-NAND</text>

  <!-- NAND chip 2 -->
  <rect x="185" y="82" width="42" height="38" rx="2" fill="url(#chipGrad)"/>
  <rect x="187" y="84" width="38" height="34" rx="1.5" fill="#1c1c1c"/>
  <text x="206" y="105" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">V-NAND</text>

  <!-- DRAM chip -->
  <rect x="234" y="85" width="38" height="30" rx="2" fill="url(#chipGrad)"/>
  <rect x="236" y="87" width="34" height="26" rx="1.5" fill="#1c1c1c"/>
  <text x="253" y="103" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">LPDDR5</text>

  <!-- M.2 mounting hole -->
  <circle cx="280" cy="102.5" r="4" fill="#0d2d1a" stroke="#2a5a3e" stroke-width="1"/>
  <circle cx="280" cy="102.5" r="1.5" fill="#d4a017"/>

  <!-- PCB traces (decorative) -->
  <line x1="50" y1="90" x2="68" y2="90" stroke="#2a6a3e" stroke-width="0.8" opacity="0.6"/>
  <line x1="50" y1="95" x2="68" y2="95" stroke="#2a6a3e" stroke-width="0.8" opacity="0.6"/>
  <line x1="50" y1="115" x2="68" y2="115" stroke="#2a6a3e" stroke-width="0.8" opacity="0.6"/>

  <!-- Speed label -->
  <text x="160" y="158" font-family="Arial, sans-serif" font-size="11" fill="#0d6e35" text-anchor="middle" font-weight="bold">14,800 MB/s READ · PCIe 5.0 x4 · NVMe 2.0</text>

  <!-- Product badge -->
  <rect x="110" y="165" width="100" height="22" rx="11" fill="#1428A0"/>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="10.5" fill="white" text-anchor="middle" font-weight="bold">Samsung 9100 Pro</text>
</svg>
