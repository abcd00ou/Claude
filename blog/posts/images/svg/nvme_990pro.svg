<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="pcbGrad990" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="chipGrad990" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#252525"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="#f0f4ff" rx="10"/>

  <!-- PCB -->
  <rect x="30" y="75" width="260" height="55" rx="4" fill="url(#pcbGrad990)" filter="drop-shadow(2px 5px 6px rgba(0,0,0,0.4))"/>

  <!-- Gold edge connector -->
  <rect x="30" y="117" width="22" height="13" rx="1" fill="#b8860b"/>
  <rect x="44" y="117" width="3" height="6" rx="0.5" fill="#1a3a5c"/>
  <rect x="31" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="33.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="36" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="38.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="41" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="47" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>

  <!-- Controller chip -->
  <rect x="68" y="82" width="52" height="40" rx="3" fill="url(#chipGrad990)"/>
  <rect x="70" y="84" width="48" height="36" rx="2" fill="#181818"/>
  <text x="94" y="98" font-family="Arial, sans-serif" font-size="7.5" fill="#888" text-anchor="middle">SAMSUNG</text>
  <text x="94" y="108" font-family="Arial, sans-serif" font-size="8" fill="#aaa" text-anchor="middle" font-weight="bold">990 Pro</text>
  <text x="94" y="118" font-family="Arial, sans-serif" font-size="6.5" fill="#666" text-anchor="middle">PCIe 4.0</text>

  <!-- NAND chips -->
  <rect x="135" y="82" width="40" height="38" rx="2" fill="url(#chipGrad990)"/>
  <rect x="137" y="84" width="36" height="34" rx="1.5" fill="#1a1a1a"/>
  <text x="155" y="105" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">V-NAND</text>

  <rect x="180" y="82" width="40" height="38" rx="2" fill="url(#chipGrad990)"/>
  <rect x="182" y="84" width="36" height="34" rx="1.5" fill="#1a1a1a"/>
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">V-NAND</text>

  <rect x="226" y="85" width="36" height="30" rx="2" fill="url(#chipGrad990)"/>
  <rect x="228" y="87" width="32" height="26" rx="1.5" fill="#1a1a1a"/>
  <text x="244" y="103" font-family="Arial, sans-serif" font-size="6.5" fill="#666" text-anchor="middle">DRAM</text>

  <!-- Mounting hole -->
  <circle cx="278" cy="102.5" r="4" fill="#0d2040" stroke="#2a5080" stroke-width="1"/>
  <circle cx="278" cy="102.5" r="1.5" fill="#d4a017"/>

  <!-- Speed label -->
  <text x="160" y="158" font-family="Arial, sans-serif" font-size="11" fill="#1428A0" text-anchor="middle" font-weight="bold">7,450 MB/s READ · PCIe 4.0 x4 · NVMe 2.0</text>

  <rect x="110" y="165" width="100" height="22" rx="11" fill="#1428A0"/>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="10.5" fill="white" text-anchor="middle" font-weight="bold">Samsung 990 Pro</text>
</svg>
