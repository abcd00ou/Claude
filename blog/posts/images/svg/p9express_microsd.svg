<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1428A0"/>
      <stop offset="100%" style="stop-color:#0a1060"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3eb0"/>
      <stop offset="100%" style="stop-color:#0e1a70"/>
    </linearGradient>
    <filter id="shadowCard">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="320" height="200" fill="#f0f4ff" rx="10"/>

  <!-- microSD card body -->
  <!-- Main card rectangle with notch corner -->
  <path d="M100,40 L220,40 L220,160 L100,160 L100,80 L115,40 Z"
        fill="url(#cardGrad)" filter="url(#shadowCard)" rx="4"/>

  <!-- Actually use polygon for notched corner -->
  <polygon points="115,40 220,40 220,160 100,160 100,80"
           fill="url(#cardGrad)" filter="url(#shadowCard)"/>

  <!-- Card label area -->
  <rect x="108" y="55" width="104" height="72" rx="3" fill="url(#labelGrad)"/>

  <!-- Samsung logo -->
  <text x="160" y="78" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">SAMSUNG</text>

  <!-- Product name -->
  <text x="160" y="98" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">P9 Express</text>

  <!-- microSD Express logo area -->
  <rect x="120" y="105" width="80" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="115.5" font-family="Arial, sans-serif" font-size="8.5" fill="white" text-anchor="middle" font-weight="bold">microSD Express</text>

  <!-- Capacity -->
  <text x="160" y="133" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="bold">512 GB</text>

  <!-- UHS rating -->
  <rect x="115" y="138" width="22" height="16" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <text x="126" y="150" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">A2</text>

  <rect x="141" y="138" width="18" height="16" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <text x="150" y="150" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">U3</text>

  <!-- Express speed indicator -->
  <rect x="163" y="138" width="30" height="16" rx="2" fill="rgba(255,200,0,0.25)" stroke="rgba(255,200,0,0.6)" stroke-width="0.8"/>
  <text x="178" y="150" font-family="Arial, sans-serif" font-size="7.5" fill="#ffe066" text-anchor="middle" font-weight="bold">PCIe</text>

  <!-- Gold contacts at bottom -->
  <rect x="108" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="118" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="128" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="138" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="148" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="158" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="168" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="178" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="188" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="198" y="147" width="8" height="13" rx="1" fill="#c8a000"/>
  <rect x="208" y="147" width="8" height="13" rx="1" fill="#c8a000"/>

  <!-- Speed label -->
  <text x="160" y="182" font-family="Arial, sans-serif" font-size="11" fill="#1428A0" text-anchor="middle" font-weight="bold">800 MB/s READ · microSD Express (PCIe 3.1)</text>
</svg>
