<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="pcbGradEvo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a4a"/>
      <stop offset="100%" style="stop-color:#180d30"/>
    </linearGradient>
    <linearGradient id="chipGradEvo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#242424"/>
      <stop offset="100%" style="stop-color:#0e0e0e"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="#f0f4ff" rx="10"/>

  <!-- PCB -->
  <rect x="30" y="75" width="260" height="55" rx="4" fill="url(#pcbGradEvo)" filter="drop-shadow(2px 5px 6px rgba(0,0,0,0.4))"/>

  <!-- Gold edge connector -->
  <rect x="30" y="117" width="22" height="13" rx="1" fill="#b8860b"/>
  <rect x="44" y="117" width="3" height="6" rx="0.5" fill="#2a1a4a"/>
  <rect x="31" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="33.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="36" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="38.5" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="41" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>
  <rect x="47" y="119" width="1.5" height="9" rx="0.5" fill="#d4a017"/>

  <!-- Controller chip -->
  <rect x="68" y="82" width="52" height="40" rx="3" fill="url(#chipGradEvo)"/>
  <rect x="70" y="84" width="48" height="36" rx="2" fill="#171717"/>
  <text x="94" y="97" font-family="Arial, sans-serif" font-size="7.5" fill="#888" text-anchor="middle">SAMSUNG</text>
  <text x="94" y="107" font-family="Arial, sans-serif" font-size="7.5" fill="#aaa" text-anchor="middle" font-weight="bold">990 Evo+</text>
  <text x="94" y="117" font-family="Arial, sans-serif" font-size="6" fill="#666" text-anchor="middle">PCIe 4.0/5.0</text>

  <!-- NAND chips (single-sided, 990 Evo Plus is slimmer) -->
  <rect x="135" y="84" width="38" height="36" rx="2" fill="url(#chipGradEvo)"/>
  <rect x="137" y="86" width="34" height="32" rx="1.5" fill="#191919"/>
  <text x="154" y="105" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">V-NAND</text>

  <rect x="178" y="84" width="38" height="36" rx="2" fill="url(#chipGradEvo)"/>
  <rect x="180" y="86" width="34" height="32" rx="1.5" fill="#191919"/>
  <text x="197" y="105" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">V-NAND</text>

  <!-- No separate DRAM (Evo Plus is HMB based) -->
  <rect x="222" y="84" width="30" height="28" rx="2" fill="url(#chipGradEvo)"/>
  <rect x="224" y="86" width="26" height="24" rx="1.5" fill="#191919"/>
  <text x="237" y="101" font-family="Arial, sans-serif" font-size="6" fill="#555" text-anchor="middle">HMB</text>

  <!-- PCIe 4/5 hybrid label on chip -->
  <rect x="258" y="84" width="26" height="16" rx="2" fill="rgba(100,50,200,0.3)" stroke="#6432c8" stroke-width="0.8"/>
  <text x="271" y="95" font-family="Arial, sans-serif" font-size="6.5" fill="#a070ff" text-anchor="middle" font-weight="bold">Gen5×2</text>

  <!-- Mounting hole -->
  <circle cx="278" cy="108" r="4" fill="#180d30" stroke="#3a2a5a" stroke-width="1"/>
  <circle cx="278" cy="108" r="1.5" fill="#d4a017"/>

  <!-- Speed label -->
  <text x="160" y="158" font-family="Arial, sans-serif" font-size="11" fill="#5a2fa0" text-anchor="middle" font-weight="bold">7,250 MB/s READ · PCIe 4.0/5.0 하이브리드</text>

  <rect x="105" y="165" width="110" height="22" rx="11" fill="#5a2fa0"/>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="10.5" fill="white" text-anchor="middle" font-weight="bold">Samsung 990 Evo Plus</text>
</svg>
